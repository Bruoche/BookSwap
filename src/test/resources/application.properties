# Base de données H2 pour les tests (en mémoire)
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;MODE=PostgreSQL
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.log.sql=false

# Désactiver les Dev Services
%test.quarkus.datasource.devservices.enabled=false

# JWT pour les tests (même issuer que la config principale)
%test.mp.jwt.verify.issuer=https://exchange-manager-api.com