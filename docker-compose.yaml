services:
  db:
    container_name: bookswap-db
    image: postgres
    environment:
      - POSTGRES_DB=bookswap_db
      - POSTGRES_USER=quarkus
      - POSTGRES_PASSWORD=quarkus
      - PGDATA=/data/postgres
    volumes:
      - db:/data/postgres
    ports:
      - "5436:5432"
    networks:
      - db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d postgres" ]
      interval: 30s
      timeout: 10s
      retries: 5
networks:
  db:
    driver: bridge

volumes:
  db: