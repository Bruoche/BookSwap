services:
  db:
    container_name: bookswap-db
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=bookswap_db
      - POSTGRES_USER=quarkus
      - POSTGRES_PASSWORD=quarkus
      - PGDATA=/data/postgres
    volumes:
      - bookswap_db:/data/postgres
    ports:
      - "5436:5432"
    networks:
      - db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d bookswap_db -U quarkus" ]
      interval: 30s
      timeout: 10s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.jvm
    container_name: bookswap-app
    networks:
      - db
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://db:5432/bookswap_db
      # Need to secure that eventually
      - QUARKUS_DATASOURCE_USERNAME=quarkus
      - QUARKUS_DATASOURCE_PASSWORD=quarkus
    depends_on:
      db:
        condition: service_healthy

networks:
  db:
    driver: bridge

volumes:
  bookswap_db: